name: Code Quality and Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Code quality checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-quality-${{ hashFiles('**/Cargo.lock') }}

      - name: Check code formatting
        run: |
          cargo fmt --all -- --check

      - name: Run clippy - Rust core
        working-directory: src/rust
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run clippy - CLI
        working-directory: cli
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for common mistakes
        run: |
          # Check for TODO comments in main branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ! grep -r "TODO\|FIXME\|XXX" src/ cli/ --include="*.rs" || echo "Warning: TODO comments found"
          fi

  # Test coverage with detailed reporting
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage - Rust core
        working-directory: src/rust
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path ../../lcov-rust-core.info
          cargo llvm-cov report --json --output-path ../../coverage-rust-core.json

      - name: Generate coverage - CLI
        working-directory: cli
        run: |
          cargo llvm-cov --all-features --lcov --output-path ../lcov-cli.info
          cargo llvm-cov report --json --output-path ../coverage-cli.json

      - name: Parse coverage percentages
        id: coverage
        run: |
          # Extract coverage percentages
          RUST_COVERAGE=$(jq '.data[0].totals.lines.percent' coverage-rust-core.json)
          CLI_COVERAGE=$(jq '.data[0].totals.lines.percent' coverage-cli.json)

          echo "rust_coverage=$RUST_COVERAGE" >> $GITHUB_OUTPUT
          echo "cli_coverage=$CLI_COVERAGE" >> $GITHUB_OUTPUT

          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "- Rust Core: ${RUST_COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "- CLI: ${CLI_COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          THRESHOLD=80
          RUST_COV=${{ steps.coverage.outputs.rust_coverage }}
          CLI_COV=${{ steps.coverage.outputs.cli_coverage }}

          if (( $(echo "$RUST_COV < $THRESHOLD" | bc -l) )); then
            echo "❌ Rust core coverage ($RUST_COV%) is below threshold ($THRESHOLD%)"
            exit 1
          fi

          if (( $(echo "$CLI_COV < $THRESHOLD" | bc -l) )); then
            echo "❌ CLI coverage ($CLI_COV%) is below threshold ($THRESHOLD%)"
            exit 1
          fi

          echo "✅ All coverage checks passed!"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-rust-core.info,lcov-cli.info
          flags: unittests
          name: zipminator-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate HTML coverage report
        run: |
          cargo install cargo-llvm-cov
          cd src/rust && cargo llvm-cov --all-features --html
          cd ../../cli && cargo llvm-cov --all-features --html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            src/rust/target/llvm-cov/html/
            cli/target/llvm-cov/html/
          retention-days: 30

  # Documentation quality
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check documentation
        run: |
          cargo doc --all --no-deps --document-private-items

      - name: Check for missing documentation
        run: |
          # Enable warnings for missing docs
          RUSTDOCFLAGS="-D missing_docs" cargo doc --all --no-deps || echo "Missing documentation found"

      - name: Verify README examples
        run: |
          # Check if code examples in README compile
          cargo test --doc --manifest-path=cli/Cargo.toml

  # Dependency audit and update check
  dependency-health:
    name: Dependency Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        run: |
          cargo outdated --root-deps-only > outdated-deps.txt
          cat outdated-deps.txt

      - name: Check dependency tree
        run: |
          cargo tree --all-features > dependency-tree.txt

      - name: Analyze duplicate dependencies
        run: |
          cargo tree --duplicates > duplicates.txt || echo "No duplicates found"

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            outdated-deps.txt
            dependency-tree.txt
            duplicates.txt
          retention-days: 30

  # License compliance
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Check licenses
        run: |
          cargo license --all-features --json > licenses.json
          cargo license --all-features > licenses.txt

      - name: Verify license compatibility
        run: |
          # Check for incompatible licenses
          ! grep -i "GPL" licenses.txt || echo "Warning: GPL licenses found"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            licenses.txt
          retention-days: 90

  # Code complexity analysis
  complexity-analysis:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-geiger (unsafe code detection)
        run: cargo install cargo-geiger

      - name: Scan for unsafe code
        run: |
          cargo geiger --all-features > unsafe-code-report.txt || echo "Scan completed"

      - name: Check unsafe usage
        run: |
          echo "=== Unsafe Code Usage ===" >> $GITHUB_STEP_SUMMARY
          cat unsafe-code-report.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: unsafe-code-report.txt
          retention-days: 30

  # Quality gate summary
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [code-quality, coverage, docs-quality, dependency-health, license-check]
    if: always()

    steps:
      - name: Check quality gate
        run: |
          if [ "${{ needs.code-quality.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.docs-quality.result }}" != "success" ]; then
            echo "❌ Quality gate failed!"
            exit 1
          fi
          echo "✅ Quality gate passed!"

      - name: Generate quality report
        run: |
          cat > quality-summary.md << EOF
          # Quality Gate Summary

          ## Results
          - Code Quality: ${{ needs.code-quality.result }}
          - Coverage: ${{ needs.coverage.result }}
          - Documentation: ${{ needs.docs-quality.result }}
          - Dependencies: ${{ needs.dependency-health.result }}
          - Licenses: ${{ needs.license-check.result }}

          ## Status
          All quality checks must pass before merging.

          Generated: $(date -u)
          EOF

          cat quality-summary.md >> $GITHUB_STEP_SUMMARY

  # Quality notification via Claude Flow
  quality-notification:
    name: Quality Notification
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send quality metrics
        run: |
          STATUS="${{ needs.quality-gate.result }}"
          if [ "$STATUS" = "success" ]; then
            npx claude-flow@alpha hooks notify --message "Quality gate passed for commit ${{ github.sha }}"
          else
            npx claude-flow@alpha hooks notify --message "Quality gate failed for commit ${{ github.sha }}"
          fi
          npx claude-flow@alpha hooks post-task --task-id "quality-check-${{ github.run_number }}"
