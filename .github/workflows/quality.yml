name: Code Quality and Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # -------------------------------------------------------------------------
  # Code quality checks (clippy, fmt, common mistakes)
  # -------------------------------------------------------------------------
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-quality-${{ hashFiles('**/Cargo.lock') }}

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check for common mistakes
        run: |
          # Check for TODO comments in main branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ! grep -r "TODO\|FIXME\|XXX" crates/ src/ --include="*.rs" || echo "Warning: TODO comments found"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python linters
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ || echo "Ruff check completed with warnings"

      - name: Run ruff format check
        run: ruff format --check src/ tests/ || echo "Ruff format check completed"

  # -------------------------------------------------------------------------
  # Security audit (cargo-audit, cargo-deny)
  # -------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Run cargo deny
        run: cargo deny check || echo "cargo-deny completed with warnings"

  # -------------------------------------------------------------------------
  # Test coverage with detailed reporting
  # -------------------------------------------------------------------------
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate workspace coverage
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov-workspace.info
          cargo llvm-cov report --json --output-path coverage-workspace.json

      - name: Parse coverage percentages
        id: coverage
        run: |
          WORKSPACE_COVERAGE=$(jq '.data[0].totals.lines.percent' coverage-workspace.json)
          echo "workspace_coverage=$WORKSPACE_COVERAGE" >> $GITHUB_OUTPUT

          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace: ${WORKSPACE_COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          THRESHOLD=80
          WS_COV=${{ steps.coverage.outputs.workspace_coverage }}

          if (( $(echo "$WS_COV < $THRESHOLD" | bc -l) )); then
            echo "Workspace coverage ($WS_COV%) is below threshold ($THRESHOLD%)"
            exit 1
          fi

          echo "All coverage checks passed!"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-workspace.info
          flags: unittests
          name: zipminator-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate HTML coverage report
        run: cargo llvm-cov --all-features --workspace --html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30

  # -------------------------------------------------------------------------
  # Documentation quality
  # -------------------------------------------------------------------------
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check documentation builds
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Check for missing documentation
        run: |
          RUSTDOCFLAGS="-D missing_docs" cargo doc --workspace --no-deps || echo "Missing documentation found"

      - name: Verify doc tests
        run: cargo test --doc --workspace

  # -------------------------------------------------------------------------
  # Dependency health
  # -------------------------------------------------------------------------
  dependency-health:
    name: Dependency Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        run: |
          cargo outdated --root-deps-only > outdated-deps.txt
          cat outdated-deps.txt

      - name: Check dependency tree
        run: cargo tree --all-features > dependency-tree.txt

      - name: Analyze duplicate dependencies
        run: cargo tree --duplicates > duplicates.txt || echo "No duplicates found"

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            outdated-deps.txt
            dependency-tree.txt
            duplicates.txt
          retention-days: 30

  # -------------------------------------------------------------------------
  # License compliance
  # -------------------------------------------------------------------------
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Check licenses
        run: |
          cargo license --all-features --json > licenses.json
          cargo license --all-features > licenses.txt

      - name: Verify license compatibility
        run: |
          # Check for incompatible licenses
          ! grep -i "GPL" licenses.txt || echo "Warning: GPL licenses found"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            licenses.txt
          retention-days: 90

  # -------------------------------------------------------------------------
  # Unsafe code detection
  # -------------------------------------------------------------------------
  complexity-analysis:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-geiger (unsafe code detection)
        run: cargo install cargo-geiger

      - name: Scan for unsafe code
        run: cargo geiger --all-features > unsafe-code-report.txt || echo "Scan completed"

      - name: Check unsafe usage
        run: |
          echo "=== Unsafe Code Usage ===" >> $GITHUB_STEP_SUMMARY
          cat unsafe-code-report.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: unsafe-code-report.txt
          retention-days: 30

  # -------------------------------------------------------------------------
  # Quality gate summary
  # -------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [code-quality, security-audit, coverage, docs-quality, dependency-health, license-check]
    if: always()

    steps:
      - name: Check quality gate
        run: |
          echo "# Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: ${{ needs.coverage.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation: ${{ needs.docs-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: ${{ needs.dependency-health.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Licenses: ${{ needs.license-check.result }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.code-quality.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.docs-quality.result }}" != "success" ]; then
            echo "Quality gate failed!"
            exit 1
          fi
          echo "Quality gate passed!"

  # NOTE: Claude Flow notification pattern is duplicated across 8+ workflows.
  # TODO: Extract into a reusable composite action at .github/actions/claude-flow-notify/action.yml
  quality-notification:
    name: Quality Notification
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send quality metrics
        run: |
          STATUS="${{ needs.quality-gate.result }}"
          if [ "$STATUS" = "success" ]; then
            npx claude-flow@alpha hooks notify --message "Quality gate passed for commit ${{ github.sha }}"
          else
            npx claude-flow@alpha hooks notify --message "Quality gate failed for commit ${{ github.sha }}"
          fi
          npx claude-flow@alpha hooks post-task --task-id "quality-check-${{ github.run_number }}"
