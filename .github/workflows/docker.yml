name: Docker Build and Push

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build multi-platform Docker images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: zipminator-cli
            context: .
            dockerfile: docker/Dockerfile.cli
            platforms: linux/amd64,linux/arm64
          - image: zipminator-api
            context: .
            dockerfile: docker/Dockerfile.api
            platforms: linux/amd64,linux/arm64
          - image: zipminator-full
            context: .
            dockerfile: docker/Dockerfile
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # Security scanning with Trivy
  docker-security-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/zipminator-full:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Test Docker images
  docker-test:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        image: [zipminator-cli, zipminator-api]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:${{ github.sha }}

      - name: Test image (CLI)
        if: matrix.image == 'zipminator-cli'
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:${{ github.sha }} --version
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:${{ github.sha }} --help

      - name: Test image (API)
        if: matrix.image == 'zipminator-api'
        run: |
          docker run -d --name test-api -p 8080:8080 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-api

  # Docker Compose integration test
  docker-compose-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create docker-compose override
        run: |
          cat > docker-compose.override.yml << EOF
          version: '3.8'
          services:
            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/zipminator-api:${{ github.sha }}
            cli:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/zipminator-cli:${{ github.sha }}
          EOF

      - name: Start services
        run: |
          docker compose up -d
          sleep 15

      - name: Run integration tests
        run: |
          docker compose exec -T api python -c "import zipminator_pqc; print('Python import successful')"
          docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # Claude Flow notification
  docker-notification:
    name: Docker Build Notification
    runs-on: ubuntu-latest
    needs: [docker-build, docker-security-scan, docker-test]
    if: always()

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send notification
        run: |
          STATUS="${{ needs.docker-build.result }}"
          if [ "$STATUS" = "success" ]; then
            npx claude-flow@alpha hooks notify --message "Docker images built and pushed successfully"
          else
            npx claude-flow@alpha hooks notify --message "Docker build failed"
          fi
          npx claude-flow@alpha hooks post-task --task-id "docker-build-${{ github.run_number }}"
