name: Code Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust code coverage with llvm-cov (workspace-level)
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate workspace coverage
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path coverage-workspace.lcov
          cargo llvm-cov report --html --output-dir coverage-html-workspace

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-workspace.lcov
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload HTML coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-html
          path: coverage-html-workspace/

      - name: Check coverage thresholds
        run: |
          WORKSPACE_COV=$(cargo llvm-cov report --json --workspace | jq -r '.data[0].totals.lines.percent')

          echo "Workspace coverage: $WORKSPACE_COV%"

          # Require 80% minimum coverage
          if (( $(echo "$WORKSPACE_COV < 80" | bc -l) )); then
            echo "Workspace coverage below 80%: $WORKSPACE_COV%"
            exit 1
          fi

          echo "Coverage thresholds met"

  # Python coverage with pytest-cov
  python-coverage:
    name: Python Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install maturin pytest pytest-cov pytest-benchmark coverage[toml]

      - name: Build Python package
        run: maturin develop

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=zipminator \
            --cov-report=xml:coverage-python.xml \
            --cov-report=html:coverage-html-python \
            --cov-report=term-missing \
            -v

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-python.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-html
          path: coverage-html-python/

  # Combined coverage report
  coverage-report:
    name: Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [rust-coverage, python-coverage]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all coverage reports
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "# Coverage Summary" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "Coverage reports generated for:" >> coverage-summary.md
          echo "- Rust workspace (all crates)" >> coverage-summary.md
          echo "- Python bindings" >> coverage-summary.md
          echo "" >> coverage-summary.md
          echo "View detailed reports in artifacts." >> coverage-summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.md

  # Quality gate check
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [rust-coverage, python-coverage]

    steps:
      - name: Check overall quality
        run: |
          echo "All coverage thresholds met"
          echo "Quality gate passed"
