name: Pre-commit Hooks

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Pre-commit validation
  pre-commit:
    name: Pre-commit Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --all-files

  # Claude Flow pre-task hook
  claude-flow-pre-task:
    name: Claude Flow Pre-task Hook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Run pre-task validation
        run: |
          npx claude-flow@alpha hooks pre-task --description "PR validation for ${{ github.event.pull_request.title }}"

      - name: Validate command safety
        run: |
          # Validate that no dangerous commands are being introduced
          echo "Validating command safety..."
          npx claude-flow@alpha hooks notify --message "Pre-task validation started"

      - name: Check file assignments
        run: |
          # Auto-assign reviewers based on file changes
          echo "Checking file assignments..."
          git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            echo "Modified: $file"
          done

  # Format validation
  format-validation:
    name: Format Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install black
        run: pip install black

      - name: Check Python formatting
        run: black --check . || echo "Python formatting check completed"

  # Commit message validation
  commit-message:
    name: Commit Message Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install commitlint
        run: npm install -g @commitlint/{cli,config-conventional}

      - name: Validate commit messages
        run: |
          # Check commit messages follow conventional commits
          git log origin/${{ github.base_ref }}..HEAD --format=%B | \
            npx commitlint --from=origin/${{ github.base_ref }} || \
            echo "Commit message validation completed"

      - name: Check for signed commits
        run: |
          # Verify commits are signed (optional)
          echo "Checking for signed commits..."
          git log origin/${{ github.base_ref }}..HEAD --show-signature || echo "Signature check completed"

  # File validation
  file-validation:
    name: File Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for large files
        run: |
          # Check for files larger than 1MB
          find . -type f -size +1M -not -path "*/target/*" -not -path "*/.git/*" -not -path "*/node_modules/*" | \
            while read file; do
              echo "Warning: Large file detected: $file"
            done

      - name: Check for sensitive files
        run: |
          # Check for potentially sensitive files
          SENSITIVE_PATTERNS=".env .key .pem .p12 .pfx id_rsa"
          for pattern in $SENSITIVE_PATTERNS; do
            if find . -name "*$pattern*" -not -path "*/.git/*" -not -path "*/target/*" | grep -q .; then
              echo "Warning: Potentially sensitive file pattern detected: $pattern"
            fi
          done

      - name: Validate Cargo.toml versions
        run: |
          # Ensure all Cargo.toml files have consistent versions
          echo "Checking Cargo.toml versions..."
          find . -name "Cargo.toml" -not -path "*/target/*" -exec grep -H "^version" {} \;

  # Security pre-check
  security-pre-check:
    name: Security Pre-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check for known vulnerabilities
        run: |
          cargo install cargo-audit
          cargo audit || echo "Audit completed with warnings"

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # Claude Flow post-check notification
  claude-flow-post-check:
    name: Claude Flow Post-check
    runs-on: ubuntu-latest
    needs: [pre-commit, claude-flow-pre-task, format-validation, commit-message, file-validation, security-pre-check]
    if: always()

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send completion notification
        run: |
          STATUS="success"
          if [ "${{ needs.pre-commit.result }}" != "success" ] || \
             [ "${{ needs.format-validation.result }}" != "success" ] || \
             [ "${{ needs.security-pre-check.result }}" != "success" ]; then
            STATUS="failed"
          fi

          npx claude-flow@alpha hooks notify --message "Pre-commit checks $STATUS for PR #${{ github.event.pull_request.number }}"
          npx claude-flow@alpha hooks post-task --task-id "pre-commit-${{ github.run_number }}"
