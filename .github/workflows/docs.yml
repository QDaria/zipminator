name: Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build Rust documentation
  rust-docs:
    name: Build Rust Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Create index redirect
        run: |
          cat > target/doc/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=zipminator_core/index.html">
          </head>
          <body>
            Redirecting to documentation...
          </body>
          </html>
          EOF

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: target/doc/
          retention-days: 30

  # Build user documentation (mdBook)
  user-docs:
    name: Build User Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build mdBook documentation
        run: |
          if [ -f "docs/book.toml" ]; then
            cd docs
            mdbook build
          else
            echo "No mdBook configuration found"
            mkdir -p docs/book
            echo "<h1>Documentation coming soon</h1>" > docs/book/index.html
          fi

      - name: Upload user docs
        uses: actions/upload-artifact@v4
        with:
          name: user-docs
          path: docs/book/
          retention-days: 30

  # Build API documentation with Sphinx (Python)
  python-docs:
    name: Build Python API Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install maturin sphinx sphinx-rtd-theme

      - name: Build Python package
        run: maturin develop

      - name: Generate API documentation
        run: |
          mkdir -p docs/python-api
          cat > docs/python-api/conf.py << EOF
          project = 'Zipminator-PQC'
          copyright = '2024, Zipminator Team'
          author = 'Zipminator Team'
          extensions = ['sphinx.ext.autodoc', 'sphinx.ext.napoleon']
          html_theme = 'sphinx_rtd_theme'
          EOF

          cat > docs/python-api/index.rst << EOF
          Zipminator-PQC Python API
          =========================

          .. automodule:: zipminator
             :members:
             :undoc-members:
             :show-inheritance:
          EOF

          cd docs/python-api
          sphinx-build -b html . _build

      - name: Upload Python docs
        uses: actions/upload-artifact@v4
        with:
          name: python-docs
          path: docs/python-api/_build/
          retention-days: 30

  # Deploy documentation to GitHub Pages
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [rust-docs, user-docs, python-docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Rust docs
        uses: actions/download-artifact@v4
        with:
          name: rust-docs
          path: public/rust/

      - name: Download user docs
        uses: actions/download-artifact@v4
        with:
          name: user-docs
          path: public/

      - name: Download Python docs
        uses: actions/download-artifact@v4
        with:
          name: python-docs
          path: public/python/

      - name: Create index page
        run: |
          cat > public/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Zipminator-PQC Documentation</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
                background: #f5f5f5;
              }
              .container {
                background: white;
                padding: 40px;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
              }
              h1 { color: #2c3e50; }
              .docs-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                margin-top: 30px;
              }
              .doc-card {
                padding: 20px;
                border: 2px solid #3498db;
                border-radius: 8px;
                text-decoration: none;
                color: inherit;
                transition: transform 0.2s;
              }
              .doc-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 4px 12px rgba(52,152,219,0.3);
              }
              .doc-card h2 { margin-top: 0; color: #3498db; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Zipminator-PQC Documentation</h1>
              <p>Post-Quantum Cryptography with CRYSTALS-Kyber-768</p>

              <div class="docs-grid">
                <a href="rust/" class="doc-card">
                  <h2>Rust API Documentation</h2>
                  <p>Complete Rust API reference for the core library</p>
                </a>

                <a href="python/" class="doc-card">
                  <h2>Python API Documentation</h2>
                  <p>Python bindings and API reference</p>
                </a>

                <a href="https://github.com/MoHoushmand/zipminator-pqc" class="doc-card">
                  <h2>GitHub Repository</h2>
                  <p>Source code, issues, and contributions</p>
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

  # Documentation validation
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README links
        run: |
          # Install markdown-link-check
          npm install -g markdown-link-check

          # Check all markdown files
          find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/target/*" -exec markdown-link-check {} \; || echo "Some links may be broken"

      - name: Validate examples in documentation
        run: |
          # Extract and validate code examples
          echo "Validating code examples..."

      - name: Check documentation completeness
        run: |
          # Check for undocumented public APIs
          echo "Checking documentation completeness..."

  # NOTE: Claude Flow notification pattern is duplicated across 8+ workflows.
  # TODO: Extract into a reusable composite action at .github/actions/claude-flow-notify/action.yml
  docs-notification:
    name: Documentation Notification
    runs-on: ubuntu-latest
    needs: [deploy-docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send documentation update notification
        run: |
          npx claude-flow@alpha hooks notify --message "Documentation updated and deployed to GitHub Pages"
          npx claude-flow@alpha hooks post-task --task-id "docs-deploy-${{ github.run_number }}"
