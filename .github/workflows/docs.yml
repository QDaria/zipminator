name: Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build Rust documentation
  rust-docs:
    name: Build Rust Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: target/doc/
          retention-days: 30

  # Build Jupyter Book documentation
  jupyter-book:
    name: Build Jupyter Book
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r docs/book/requirements.txt

      - name: Build Jupyter Book
        run: |
          cd docs/book
          jupyter-book build . --all

      - name: Upload Jupyter Book
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-book
          path: docs/book/_build/html/
          retention-days: 30

  # Deploy documentation to GitHub Pages
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [rust-docs, jupyter-book]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Jupyter Book
        uses: actions/download-artifact@v4
        with:
          name: jupyter-book
          path: public/

      - name: Download Rust docs
        uses: actions/download-artifact@v4
        with:
          name: rust-docs
          path: public/rust/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Documentation validation
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Jupyter Book structure
        run: |
          python3 -c "
          import yaml, sys
          toc = yaml.safe_load(open('docs/book/_toc.yml'))
          print(f'TOC format: {toc[\"format\"]}')
          parts = toc.get('parts', [])
          print(f'Parts: {len(parts)}')
          for p in parts:
              chapters = p.get('chapters', [])
              print(f'  {p[\"caption\"]}: {len(chapters)} chapters')
          sys.exit(0)
          "
