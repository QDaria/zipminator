name: Release Automation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.3.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body: |
            # Zipminator-PQC v${{ steps.get_version.outputs.version }}

            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Binary Downloads
            Download the appropriate binary for your platform below.

            ### Python Package
            ```bash
            pip install zipminator-pqc==${{ steps.get_version.outputs.version }}
            ```

            ### Cargo Install
            ```bash
            cargo install zipminator
            ```

            ## Verification
            All binaries are signed and can be verified using the provided checksums.
          draft: false
          prerelease: false

  # Build release binaries for all platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz

          # macOS targets
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI binary
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd cli/target/${{ matrix.target }}/release
          tar czf zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz zipminator
          mv zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz ../../../../

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd cli/target/${{ matrix.target }}/release
          Compress-Archive -Path zipminator.exe -DestinationPath ../../../../zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip

      - name: Generate checksums
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            shasum -a 256 zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz > zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip > zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip.sha256
          fi
        shell: bash

      - name: Upload binary to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          asset_name: zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          asset_content_type: application/octet-stream

      - name: Upload checksum to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
          asset_name: zipminator-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
          asset_content_type: text/plain

  # Build Python wheels for PyPI
  build-wheels:
    name: Build Wheels - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.os == 'ubuntu-latest' && 'x86_64' || 'auto' }}
          args: --release --out dist --manifest-path cli/Cargo.toml
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # Build source distribution
  build-sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path cli/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publish to PyPI
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [create-release, build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/zipminator-pqc/
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # Build installers
  build-installers:
    name: Build Installers - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            installer: nsis
          - os: macos-latest
            installer: dmg
          - os: ubuntu-latest
            installer: deb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        working-directory: cli
        run: cargo build --release

      - name: Create Windows installer
        if: matrix.installer == 'nsis'
        run: |
          # Add NSIS installer creation script
          echo "Creating Windows installer..."

      - name: Create macOS installer
        if: matrix.installer == 'dmg'
        run: |
          # Add DMG creation script
          echo "Creating macOS installer..."

      - name: Create Debian package
        if: matrix.installer == 'deb'
        run: |
          cargo install cargo-deb
          cd cli
          cargo deb

      - name: Upload installer to release
        if: matrix.installer == 'deb'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: cli/target/debian/zipminator_${{ needs.create-release.outputs.version }}_amd64.deb
          asset_name: zipminator_${{ needs.create-release.outputs.version }}_amd64.deb
          asset_content_type: application/vnd.debian.binary-package

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish core library
        working-directory: src/rust
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io
        run: sleep 30

      - name: Publish CLI
        working-directory: cli
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}

  # Post-release notifications
  post-release:
    name: Post-Release Tasks
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-crates, build-binaries, build-installers]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Flow
        run: npm install -g claude-flow@alpha

      - name: Send release notification
        run: |
          npx claude-flow@alpha hooks notify --message "Release v${{ needs.create-release.outputs.version }} published successfully"
          npx claude-flow@alpha hooks post-task --task-id "release-${{ needs.create-release.outputs.version }}"

      - name: Update documentation
        run: |
          echo "Release v${{ needs.create-release.outputs.version }} completed"
          # Trigger documentation update workflow
