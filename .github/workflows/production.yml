name: Production Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'tests/**'
      - 'api/**'
      - 'web/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Rust Build and Test (workspace)
  build-rust:
    name: Build and Test Rust Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-prod-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prod-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Run all tests
        run: cargo test --workspace --release

      - name: Run NIST KAT validation
        run: cargo test --release -p zipminator-nist -- --nocapture

      - name: Build Docker image
        run: docker build -f config/Dockerfile -t zipminator:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm zipminator:${{ github.sha }} --version || echo "Version check completed"

  # Security Scanning
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build-rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -f config/Dockerfile -t zipminator:scan .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zipminator:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cargo audit

  # Benchmarking
  benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    needs: [build-rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace benchmarks
        run: cargo bench --workspace --no-fail-fast || echo "Benchmarks completed"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          if-no-files-found: ignore

  # Build and push production image (only on main branch)
  publish:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    needs: [build-rust, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: config/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
