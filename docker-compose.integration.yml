version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zipminator_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  greenmail:
    image: greenmail/standalone:2.0.1
    ports:
      - "3025:3025"
      - "3110:3110"
      - "3143:3143"
      - "3465:3465"
      - "3993:3993"
      - "8080:8080"
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.users=test:test@zipminator.zip -Dgreenmail.hostname=0.0.0.0"

  coturn:
    image: coturn/coturn:4.6
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
    command: >
      -n --log-file=stdout
      --min-port=49152 --max-port=65535
      --realm=zipminator.test
      --user=test:test
      --lt-cred-mech

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      retries: 10

  mail-transport:
    build:
      context: ./email/transport
      dockerfile: Dockerfile
    ports:
      - "2525:2525"
      - "1143:1143"
      - "8025:8025"
    environment:
      DATABASE_URL: "postgresql://test:test@postgres:5432/zipminator_test"
      SMTP_HOST: "0.0.0.0"
      SMTP_PORT: "2525"
      IMAP_HOST: "0.0.0.0"
      IMAP_PORT: "1143"
      KEYDIR_URL: "http://greenmail:8080"
      GREENMAIL_SMTP_HOST: "greenmail"
      GREENMAIL_SMTP_PORT: "3025"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8025/health')"]
      interval: 5s
      retries: 10

  esp32-mock:
    build:
      context: ./tests/integration/esp32_mock
      dockerfile: Dockerfile
    ports: ["8032:8032"]

volumes:
  ollama_data:
