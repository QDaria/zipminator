plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.zipminatorcrypto'
version = '0.7.9'

android {
  namespace "expo.modules.zipminatorcrypto"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"

    // Build the JNI shim for all supported ABI targets.
    // Pre-built Rust .so files must be present in jniLibs/<abi>/ for each target.
    ndk {
      abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
    }

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.22.1"
    }
  }

  // Include pre-built Rust shared libraries for each ABI.
  // These are packaged into the APK/AAR at build time.
  sourceSets {
    main {
      jniLibs.srcDirs = ['jniLibs']
    }
  }

  lintOptions {
    abortOnError false
  }
}
