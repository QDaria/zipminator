apiVersion: v1
kind: Service
metadata:
  name: zipminator
  namespace: zipminator-prod
  labels:
    app: zipminator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: zipminator
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: http
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300
---
apiVersion: v1
kind: Service
metadata:
  name: zipminator-headless
  namespace: zipminator-prod
  labels:
    app: zipminator
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: zipminator
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
