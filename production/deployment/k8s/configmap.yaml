apiVersion: v1
kind: ConfigMap
metadata:
  name: zipminator-config
  namespace: zipminator-prod
  labels:
    app: zipminator
data:
  config.yaml: |
    # Zipminator Production Configuration
    server:
      host: "0.0.0.0"
      port: 8080
      workers: 4
      max_connections: 1000

    qrng:
      device: "/dev/qrng0"
      buffer_size: 1048576  # 1MB
      min_entropy_rate: 0.99
      health_check_interval: 60

    kyber768:
      enabled: true
      key_rotation_interval: 3600  # 1 hour
      max_key_age: 86400  # 24 hours

    api:
      rate_limit:
        requests_per_minute: 1000
        burst: 100
      auth:
        enabled: true
        token_lifetime: 3600

    monitoring:
      metrics:
        enabled: true
        path: "/metrics"
      logging:
        level: "info"
        format: "json"
        output: "stdout"

    security:
      tls:
        enabled: false  # Handled by ingress
      cors:
        enabled: true
        allowed_origins:
          - "https://app.zipminator.com"
      headers:
        x_frame_options: "DENY"
        x_content_type_options: "nosniff"
        strict_transport_security: "max-age=31536000"

  log_level: "info"
  qrng_device: "/dev/qrng0"
  max_buffer_size: "1048576"
