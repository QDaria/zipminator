apiVersion: v1
kind: Secret
metadata:
  name: zipminator-secrets
  namespace: zipminator-prod
  labels:
    app: zipminator
type: Opaque
data:
  # Example secrets - REPLACE WITH ACTUAL VALUES
  # Base64 encoded values
  api_key: WU9VUl9BUElfS0VZX0hFUkU=  # Replace with: echo -n "your-api-key" | base64
  db_password: WU9VUl9EQl9QQVNTV09SRA==  # Replace with: echo -n "your-db-password" | base64
  tls_cert: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t  # Your TLS certificate
  tls_key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t  # Your TLS key
---
# Example: Using external secret management (recommended for production)
apiVersion: v1
kind: Secret
metadata:
  name: zipminator-external-secrets
  namespace: zipminator-prod
  annotations:
    # Example using AWS Secrets Manager
    secretsmanager.amazonaws.com/secret-name: "zipminator/production/credentials"
    # Example using HashiCorp Vault
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "zipminator-prod"
    vault.hashicorp.com/agent-inject-secret-api-key: "secret/zipminator/api-key"
type: Opaque
