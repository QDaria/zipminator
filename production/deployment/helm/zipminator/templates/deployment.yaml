apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zipminator.fullname" . }}
  labels:
    {{- include "zipminator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "zipminator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "zipminator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zipminator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: ZIPMINATOR_ENV
          value: {{ .Values.environment | default "production" }}
        - name: LOG_LEVEL
          value: {{ .Values.config.logLevel }}
        volumeMounts:
        - name: config
          mountPath: /etc/zipminator
          readOnly: true
        {{- if .Values.volumes.usbDevices.enabled }}
        - name: usb-devices
          mountPath: /dev/bus/usb
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "zipminator.fullname" . }}
      {{- if .Values.volumes.usbDevices.enabled }}
      - name: usb-devices
        hostPath:
          path: {{ .Values.volumes.usbDevices.hostPath }}
          type: Directory
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
