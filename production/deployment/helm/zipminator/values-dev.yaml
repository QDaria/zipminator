# Development environment overrides
environment: development

replicaCount: 1

image:
  tag: "dev"
  pullPolicy: Never  # Use local images

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

ingress:
  enabled: false

config:
  logLevel: "debug"
  qrngDevice: "/dev/urandom"  # Use urandom for dev if no QRNG available
  server:
    workers: 2
    maxConnections: 100

monitoring:
  prometheus:
    enabled: false
  grafana:
    enabled: false

volumes:
  usbDevices:
    enabled: false  # Usually no USB QRNG in dev
