version: '3.8'

services:
  # C++ Implementation
  zipminator-cpp:
    build:
      context: ../..
      dockerfile: production/deployment/Dockerfile.cpp
    image: zipminator-cpp:latest
    container_name: zipminator-cpp
    ports:
      - "8080:8080"
    volumes:
      - ../config:/etc/zipminator:ro
      - /dev/bus/usb:/dev/bus/usb  # USB QRNG device access
    environment:
      - ZIPMINATOR_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - zipminator-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Rust Implementation
  zipminator-rust:
    build:
      context: ../..
      dockerfile: production/deployment/Dockerfile.rust
    image: zipminator-rust:latest
    container_name: zipminator-rust
    ports:
      - "8081:8080"
    volumes:
      - ../config:/etc/zipminator:ro
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - ZIPMINATOR_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - zipminator-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yaml:/etc/prometheus/rules.yaml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - zipminator-net

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-dashboard.json:/etc/grafana/dashboards/zipminator.json:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - zipminator-net

  # NGINX reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - zipminator-cpp
      - zipminator-rust
    restart: unless-stopped
    networks:
      - zipminator-net

networks:
  zipminator-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
