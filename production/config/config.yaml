# Zipminator Production Configuration

server:
  host: "0.0.0.0"
  port: 8080
  workers: 4
  max_connections: 1000
  request_timeout: 30
  keep_alive: 60

qrng:
  device: "/dev/qrng0"
  buffer_size: 1048576  # 1MB
  min_entropy_rate: 0.99
  health_check_interval: 60
  fallback_enabled: false  # No fallback to pseudorandom in production

kyber768:
  enabled: true
  key_rotation_interval: 3600  # 1 hour
  max_key_age: 86400  # 24 hours
  key_cache_size: 100
  precompute_keys: true

api:
  rate_limit:
    enabled: true
    requests_per_minute: 1000
    burst: 100
    whitelist_ips: []
  auth:
    enabled: true
    token_lifetime: 3600
    require_api_key: true
  endpoints:
    - path: "/health"
      methods: ["GET"]
      auth_required: false
    - path: "/ready"
      methods: ["GET"]
      auth_required: false
    - path: "/random"
      methods: ["GET", "POST"]
      auth_required: true
    - path: "/kyber768/keygen"
      methods: ["POST"]
      auth_required: true
    - path: "/kyber768/encap"
      methods: ["POST"]
      auth_required: true
    - path: "/kyber768/decap"
      methods: ["POST"]
      auth_required: true
    - path: "/metrics"
      methods: ["GET"]
      auth_required: false

monitoring:
  metrics:
    enabled: true
    path: "/metrics"
    port: 8080
  logging:
    level: "info"
    format: "json"
    output: "stdout"
    fields:
      - timestamp
      - level
      - message
      - request_id
      - duration
  tracing:
    enabled: false
    endpoint: ""
    sample_rate: 0.1

security:
  tls:
    enabled: false  # Handled by ingress/load balancer
    cert_file: ""
    key_file: ""
  cors:
    enabled: true
    allowed_origins:
      - "https://app.zipminator.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "OPTIONS"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
    max_age: 3600
  headers:
    x_frame_options: "DENY"
    x_content_type_options: "nosniff"
    x_xss_protection: "1; mode=block"
    strict_transport_security: "max-age=31536000; includeSubDomains"
    content_security_policy: "default-src 'self'"

performance:
  enable_compression: true
  compression_level: 6
  max_request_size: 10485760  # 10MB
  connection_pool_size: 100
