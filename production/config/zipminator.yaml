# Zipminator Production Configuration
# SPDX-License-Identifier: Apache-2.0

version: "0.1.0"
environment: "production"

# QRNG Device Configuration
qrng:
  device_type: "id_quantique_usb"
  device_path: ""  # Auto-detect
  fallback_enabled: true
  health_check_interval: 60s
  entropy_pool_size: 1048576  # 1 MB
  continuous_testing: true

  # Statistical testing thresholds (NIST SP 800-90B compliance)
  min_entropy_rate: 7.8  # bits per byte
  startup_tests_samples: 100000

# Performance Optimization
performance:
  entropy_pool_size: 1048576  # 1 MB buffer
  worker_threads: 4  # Adjust based on CPU cores
  enable_prefetch: true
  enable_batch_operations: true
  batch_size: 100

  # Caching (disable for maximum security)
  enable_caching: false
  cache_size: 0
  cache_ttl: 300s

# Security Settings
security:
  constant_time_validation: true
  side_channel_protections: true
  secure_memory: true
  memory_locking: true

  # Key lifecycle
  key_rotation_interval: 86400s  # 24 hours
  auto_key_rotation: false

  # Audit and compliance
  audit_logging: true
  audit_crypto_operations: true

# Network Configuration (future use)
network:
  bind_address: "127.0.0.1"
  port: 8443
  enable_tls: true
  cert_file: "/etc/zipminator/certs/server.crt"
  key_file: "/etc/zipminator/certs/server.key"
  ca_file: "/etc/zipminator/certs/ca.crt"

# Monitoring and Observability
monitoring:
  enabled: true
  enable_metrics: true
  enable_health_checks: true
  enable_profiling: false

  metrics_endpoint: "/metrics"
  health_endpoint: "/health"

  metrics_update_interval: 10s
  health_check_interval: 60s

# Logging Configuration
logging:
  level: "INFO"  # TRACE, DEBUG, INFO, WARN, ERROR, CRITICAL
  use_json_format: true
  log_to_console: true
  log_to_file: true
  log_to_syslog: false

  log_file_path: "/var/log/zipminator/app.log"
  max_file_size: 10485760  # 10 MB
  max_files: 5

  sensitive_data_masking: true
  include_thread_id: true
  include_process_id: true
  include_source_location: true

# Environment-specific overrides
# These can be set via environment variables with ZIPMINATOR_ prefix
# Example: ZIPMINATOR_LOGGING_LEVEL=DEBUG
