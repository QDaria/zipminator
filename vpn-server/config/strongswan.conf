# Zipminator Q-VPN Server — StrongSwan global configuration

charon {
    # Log to stderr (Docker-friendly)
    filelog {
        stderr {
            default = 1
            ike = 1
            net = 1
            cfg = 1
        }
    }

    # Virtual IP pool management
    install_virtual_ip = yes
    install_virtual_ip_on = %any

    # DNS servers pushed to clients
    dns1 = 1.1.1.1
    dns2 = 8.8.8.8

    # Thread pool
    threads = 16

    # Enable NAT-T keep-alive (critical for mobile clients)
    keep_alive = 20s

    # IKE port configuration (standard)
    port = 500
    port_nat_t = 4500

    # Plugins
    plugins {
        include /etc/strongswan.d/charon/*.conf
    }
}
