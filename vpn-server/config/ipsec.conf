# Zipminator Q-VPN Server — StrongSwan IKEv2 Configuration
#
# Matches the Flutter client NEVPNProtocolIKEv2 parameters:
#   - IKE SA:   AES-256-GCM, DH group 20 (ECP-384), SHA-384
#   - Child SA: AES-256-GCM, DH group 20 (ECP-384), SHA-384
#   - Auth:     EAP-MSCHAPv2 (useExtendedAuthentication = true)

config setup
    charondebug="ike 1, knl 1, cfg 1, net 1"
    uniqueids=never

conn %default
    # Use IKEv2 only
    keyexchange=ikev2
    # Do not reauth on rekey (smoother reconnects)
    reauth=no
    # Dead Peer Detection
    dpdaction=clear
    dpddelay=60s
    dpdtimeout=300s

conn zipminator-vpn
    # Connection type: tunnel mode
    type=tunnel
    auto=add

    # ---------- Server (left) side ----------
    left=%any
    leftid=vpn.zipminator.zip
    leftcert=server-cert.pem
    leftsendcert=always
    # Serve the full VPN subnet
    leftsubnet=0.0.0.0/0

    # ---------- Client (right) side ----------
    right=%any
    rightid=%any
    # Virtual IP pool for clients
    rightsourceip=10.14.0.0/24
    rightdns=1.1.1.1,8.8.8.8

    # ---------- Authentication ----------
    # Server authenticates with certificate, client with EAP
    leftauth=pubkey
    rightauth=eap-mschapv2
    # Send EAP identity request
    eap_identity=%identity

    # ---------- Crypto — must match Flutter client ----------
    # IKE (Phase 1): AES-256-GCM + SHA-384 + ECP-384 (DH group 20)
    ike=aes256gcm16-sha384-ecp384!
    # ESP (Phase 2): AES-256-GCM + SHA-384 + ECP-384 (DH group 20)
    esp=aes256gcm16-sha384-ecp384!

    # Rekey intervals
    ikelifetime=24h
    lifetime=8h
    margintime=30m

    # Fragment large IKE messages (important for NAT-T)
    fragmentation=yes
