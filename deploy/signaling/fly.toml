app = "zipminator-signaling"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile.signaling"

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
