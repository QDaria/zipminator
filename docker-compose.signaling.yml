services:
  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    container_name: zipminator-signaling
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
