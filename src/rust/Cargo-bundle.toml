# Cargo Bundle Configuration for Multi-Platform Installers
# This extends Cargo.toml with bundling instructions

[package.metadata.bundle]
name = "QDaria-QRNG"
identifier = "com.qdaria.qrng"
version = "0.1.0"
copyright = "Copyright (c) 2024 QDaria. All rights reserved."
category = "Developer Tool"
short_description = "Quantum Random Number Generator with Post-Quantum Cryptography"
long_description = """
QDaria QRNG provides enterprise-grade quantum random number generation using
IBM Quantum, QBraid, and Azure Quantum providers. Includes CRYSTALS-Kyber-768
post-quantum cryptography, quantum entropy pooling, and zipminator integration
for secure data compression.

Features:
- Multi-provider quantum entropy harvesting
- NIST-approved Kyber-768 post-quantum KEM
- Automated credit optimization
- Enterprise compliance (FIPS 140-2, Common Criteria)
- Cross-platform support (macOS, Windows, Linux)
"""

# Icon files (platform-specific)
icon = [
    "../../docs/icons/icon.icns",  # macOS
    "../../docs/icons/icon.ico",   # Windows
    "../../docs/icons/icon.png",   # Linux
]

# Additional resources to bundle
resources = [
    "../../config/",
    "../../examples/",
    "../../LICENSE",
    "../../README.md",
]

# macOS specific
[package.metadata.bundle.osx]
frameworks = []
minimum_system_version = "10.13"
info_plist_path = "../../build/Info.plist"
entitlements_path = "../../build/entitlements.plist"

# Windows specific
[package.metadata.bundle.windows]
wix_language = "en-US"
wix_upgrade_code = "12345678-1234-1234-1234-123456789012"
allow_downgrades = false

# Linux specific
[package.metadata.bundle.linux]
desktop_template = "../../build/linux/desktop.template"
depends = ["libssl3", "libusb-1.0-0", "python3 (>= 3.8)"]

# Binary targets to bundle
[[package.metadata.bundle.bin]]
name = "kyber768"
path = "target/release/kyber768"

[[package.metadata.bundle.bin]]
name = "qrng-harvester"
path = "../../build/bin/qrng-harvester"

# Scripts to include
[package.metadata.bundle.scripts]
# Post-install script
postinstall = "scripts/postinstall.sh"
# Pre-uninstall script
preuninstall = "scripts/preuninstall.sh"
