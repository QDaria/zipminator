title: Zipminator
author: QDaria AS
logo: _static/zipminator-logo-light.svg
exclude_patterns:
  - "_build"
  - "**.ipynb_checkpoints"
  - "**/CLAUDE.md"
  - "content/intro.md"
  - "content/appendix.md"
execute:
  execute_notebooks: "off"
  timeout: 120
parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution
    - tasklist
sphinx:
  extra_extensions:
    - sphinx_design
    - sphinx_copybutton
  config:
    html_theme: sphinx_book_theme
    html_favicon: _static/Z.svg
    html_theme_options:
      logo:
        image_light: _static/zipminator-logo-dark.svg
        image_dark: _static/zipminator-logo-light.svg
      repository_url: https://github.com/QDaria/zipminator
      use_repository_button: true
      use_issues_button: true
      use_download_button: true
      launch_buttons:
        colab_url: https://colab.research.google.com
    html_css_files:
      - custom.css
    copybutton_prompt_text: "$ "
    copybutton_prompt_is_regexp: false
repository:
  url: https://github.com/QDaria/zipminator
  branch: main
