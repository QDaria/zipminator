title: Zipminator
author: QDaria AS
logo: _static/zipminator-logo-light.svg
exclude_patterns:
  - "_build"
  - "**.ipynb_checkpoints"
  - "**/CLAUDE.md"
  - "content/intro.md"
  - "content/appendix.md"
execute:
  execute_notebooks: "auto"
  timeout: 120
  exclude_patterns:
    - "notebooks/05_shor_demo*"
    - "notebooks/07_monte_carlo*"
    - "notebooks/08_qmesh*"
    - "notebooks/09_monte_carlo*"
    - "notebooks/10_*"
    - "notebooks/Untitled*"
parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution
    - tasklist
    - html_image
sphinx:
  extra_extensions:
    - sphinx_design
    - sphinx_copybutton
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinx.ext.viewcode
  config:
    html_theme: sphinx_book_theme
    html_favicon: _static/Z.svg
    html_theme_options:
      logo:
        image_light: _static/zipminator-logo-dark.svg
        image_dark: _static/zipminator-logo-light.svg
      repository_url: https://github.com/QDaria/zipminator
      use_repository_button: true
      use_issues_button: true
      use_download_button: true
      extra_footer: '<p><a href="https://www.zipminator.zip">zipminator.zip</a> | <a href="https://www.zipminator.zip/docs">Docs Overview</a> | <a href="https://qdaria.com">QDaria</a></p>'
      launch_buttons:
        colab_url: https://colab.research.google.com
    html_css_files:
      - custom.css
    copybutton_prompt_text: "$ "
    copybutton_prompt_is_regexp: false
    # Napoleon settings for Google/NumPy docstrings
    napoleon_google_docstring: true
    napoleon_numpy_docstring: true
    napoleon_include_init_with_doc: true
    # Autodoc settings
    autodoc_default_options:
      members: true
      undoc-members: true
      show-inheritance: true
    autodoc_member_order: bysource
repository:
  url: https://github.com/QDaria/zipminator
  branch: main
