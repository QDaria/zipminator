name: zip-pqc
channels:
  - conda-forge
dependencies:
  # ── Python ──────────────────────────────────────────────────
  - python=3.11

  # ── Data Science Stack ──────────────────────────────────────
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.8
  - seaborn>=0.13
  - scikit-learn>=1.4
  - scipy>=1.12
  - plotly>=5.18
  - pyarrow>=14.0

  # ── JupyterLab + Kernel ────────────────────────────────────
  - jupyterlab>=4.0
  - ipywidgets>=8.1
  - ipykernel>=6.29
  - ipython>=8.20
  - nb_conda_kernels
  - nbformat>=5.9

  # ── Jupyter Book (documentation build) ─────────────────────
  - jupyter-book>=0.15,<1.0
  - sphinx-book-theme
  - myst-nb

  # ── Data Engineering ───────────────────────────────────────
  - sqlalchemy>=2.0
  - psycopg2>=2.9
  - redis-py>=5.0
  - httpx>=0.25

  # ── Dev Tools ──────────────────────────────────────────────
  - pip
  - pip:
    # Zipminator PQC (from PyPI, with all extras)
    - "zipminator[all]==0.5.0b1"
    # Sphinx extras
    - sphinx-design
    - sphinx-copybutton
    # Data engineering extras
    - faker>=20.0
    - pyzipper>=0.3.6
    - aiosmtpd>=1.4.0
    - asyncpg>=0.29
