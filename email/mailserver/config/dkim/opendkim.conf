# OpenDKIM Configuration -- Classical RSA-2048 DKIM (selector: s1)
# ============================================================================
# This handles the RSA-2048 DKIM signature.
# The ML-DSA-65 PQ DKIM signature is handled by a separate milter.

Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

Canonicalization        relaxed/simple
Mode                    sv
SubDomains              no
OversignHeaders         From

# Socket for Postfix milter integration
Socket                  inet:8891@localhost

# Domain and key configuration
Domain                  zipminator.zip
KeyTable                /etc/opendkim/key.table
SigningTable            refile:/etc/opendkim/signing.table
InternalHosts           /etc/opendkim/trusted.hosts
ExternalIgnoreList      /etc/opendkim/trusted.hosts

# Signature algorithm (RSA-SHA256 for classical DKIM)
SignatureAlgorithm      rsa-sha256

# PID file
PidFile                 /run/opendkim/opendkim.pid
UserID                  opendkim
