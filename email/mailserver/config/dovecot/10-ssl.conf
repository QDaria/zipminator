# Dovecot TLS Configuration -- Post-Quantum Hybrid
# X25519MLKEM768 = X25519 + ML-KEM-768 (NIST Level 3 PQ security)
# ============================================================================

ssl = required

ssl_cert = </etc/ssl/certs/mail.zipminator.zip.crt
ssl_key = </etc/ssl/private/mail.zipminator.zip.key

# Minimum TLS version
ssl_min_protocol = TLSv1.2

# PQC Key Exchange Groups
# X25519MLKEM768 preferred, with classical fallback chain
ssl_curve_list = X25519MLKEM768:X25519:prime256v1:secp384r1

# Cipher suites (TLS 1.3 uses these automatically)
ssl_cipher_list = ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# Prefer server cipher order
ssl_prefer_server_ciphers = yes

# DH parameters (for TLS 1.2 fallback)
ssl_dh = </etc/dovecot/dh.pem
