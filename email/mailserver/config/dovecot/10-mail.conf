# Dovecot Mail Location Configuration
# ============================================================================

mail_location = maildir:/var/mail/%d/%n/Maildir

namespace inbox {
  inbox = yes
  separator = /
}

# Mail process privileges
mail_uid = vmail
mail_gid = vmail
mail_privileged_group = vmail

# Mailbox auto-creation
namespace inbox {
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Spam {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = no
    special_use = \Archive
  }
}
