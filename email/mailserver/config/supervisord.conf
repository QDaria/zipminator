[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autostart=true
autorestart=true

[program:postfix]
command=/opt/scripts/start-postfix.sh
autostart=true
autorestart=true
startsecs=5

[program:dovecot]
command=/usr/sbin/dovecot -F
autostart=true
autorestart=true
startsecs=5

[program:opendkim]
command=/usr/sbin/opendkim -f
autostart=true
autorestart=true
startsecs=3
